<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 14px;
            background: #ffffff;
        }
        /* X日间导航 */
        nav {
            margin-bottom:16px;
        }
        .nav-wrap {
            display: flex;
            gap:6px;
            overflow-x: auto;
            padding:4px 2px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-wrap::-webkit-scrollbar {
            display: none;
        }
        .nav-wrap button {
            padding:9px 16px;
            border-radius:999px;
            font-size:14px;
            color:#0f1419;
            background:transparent;
            border:1px solid #d2d9e0;
            cursor:pointer;
            flex-shrink: 0;
        }
        /* X标志性蓝色选中 */
        .nav-wrap button.active {
            background:#1d9bf0;
            border: 1px solid #1d9bf0;
            color:#fff;
        }
        .nav-wrap button:not(.active):hover {
            background:#eef3f8;
        }
        .news-wrap{
            display:none;
        }
        .news-wrap.show{
            display:block;
        }
        /* X白卡片样式 */
        ul {
            list-style: none;
            background:#fff;
            border: 1px solid #e4e7ec;
            border-radius:12px;
            overflow:hidden;
        }
        li {
            padding:18px 16px;
            border-bottom:1px solid #e4e7ec;
        }
        li:last-child{
            border-bottom:none;
        }
        li a {
            font-size:17px;
            color:#0f1419;
            text-decoration:none;
        }
        li a:hover {
            text-decoration: underline;
        }
        small {
            display:block;
            margin-top:8px;
            font-size:14px;
            color:#657786;
            line-height:1.5;
        }
        /* 关键：限制small内部标签，解决内容自动换行拆分新闻条目 */
        small p {
            margin: 2px 0 !important;
        }
        small br {
            display: none !important;
        }
        small img {
            max-width: 90px !important;
            height: auto;
            display: none;
        }
    </style>
</head>
<body>
    <!-- 导航按钮占位 -->
    <nav>
        <div class="nav-wrap">
            {{NAV_BTN}}
        </div>
    </nav>
    <!-- 全部新闻容器占位 -->
    {{ALL_NEWS}}

<script>
// 栏目数据
const sourceKeys = {{KEY_LIST}};
// tab切换
const btns = document.querySelectorAll('.nav-wrap button');
const lists = document.querySelectorAll('.news-wrap');
btns.forEach(btn=>{
    btn.onclick = ()=>{
        const k = btn.dataset.key;
        // 按钮选中
        btns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        // 内容切换
        lists.forEach(box=>{
            box.classList.toggle('show', box.dataset.key === k)
        })
    }
})
</script>
</body>
</html>
